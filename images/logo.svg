<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
    <style>
        .logo-text-primary {
            fill: #0f172a;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .logo-text-secondary {
            fill: #0ea5e9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
        }
        .logo-accent-line {
            stroke: #0ea5e9;
            stroke-width: 3.5;
            stroke-linecap: round;
        }
        .logo-primary-line {
            stroke: #0f172a;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .logo-accent-dot {
            fill: #0ea5e9;
        }
        .logo-primary-dot {
            fill: #0f172a;
        }
        /* Dark mode overrides if embedded in HTML */
        @media (prefers-color-scheme: dark) {
            .logo-text-primary { fill: #f8fafc; }
            .logo-primary-line { stroke: #38bdf8; }
            .logo-primary-dot { fill: #38bdf8; }
            .logo-text-secondary { fill: #818cf8; }
            .logo-accent-line { stroke: #818cf8; }
            .logo-accent-dot { fill: #818cf8; }
        }
    </style>
    <!-- Emblem Symbol -->
    <g>
        <!-- Blue accent vertical bridge line -->
        <path d="M22 15 L22 45" class="logo-accent-line" />
        <!-- Blue accent horizontal connection -->
        <path d="M23 30 L40 30" class="logo-accent-line" />
        <!-- Primary monogram structure (Stylized K connection) -->
        <path d="M38 16 L23 30 L38 44" class="logo-primary-line" />
        <!-- Visual node markers -->
        <circle cx="22" cy="15" r="2.5" class="logo-accent-dot" />
        <circle cx="22" cy="45" r="2.5" class="logo-accent-dot" />
        <circle cx="38" cy="16" r="2" class="logo-primary-dot" />
        <circle cx="38" cy="44" r="2" class="logo-primary-dot" />
    </g>
    <!-- Text Branding -->
    <text x="56" y="32" class="logo-text-primary">KELING</text>
    <text x="56" y="46" class="logo-text-secondary">STUDIO</text>
</svg>
